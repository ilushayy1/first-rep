<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form action=>
    <label for="name">Ім'я</label><br>
    <input type="text" id="name" name="name" placeholder="Введіть своє ім'я"><br>
    <label for="surname">Призвіще</label><br>
    <input type="text" id="surname" name="surname" placeholder="Введіть своє призвіще"><br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
    <br><br>
    <input type="button" onclick="alert('Відправлено')" value="Підтвердити">
    <br><br>
    <label >Виберіть колір</label><br>
    <input type="color">
    <br><br>
    <label>Ваша дата народження</label><br>
    <input type="date">
    <br><br>
    <label>Оберіть зручну дату та час</label><br>
    <input type="datetime-local">
    <br><br>
    <label>Введіть свій email</label><br>
    <input type="email">
    <br><br>
    <input type="image" src="image.png">
    <br><br>
    <label>Завантажте ваші документи</label><br>
    <input type="file">
    <br><br>
    <input type="range" id="rating" min="0" max="10"><br>
    <label for="rating">Оцініть форму</label>
    <br><br>
    <label for="mySearch">Пошук</label><br>
    <input type="search" id="mySearch" name="q" />
    <br><br>
    <label for="url">Посилання</label><br>
    <input type="url" name="url" id="url" placeholder="https://google.com">
    <br><br>
    <label for="week">Виберіть неділю відпочинку</label><br>
    <input type="week" name="week" id="week">
    <br><br>
    <label for="number">Phone number</label><br>
    <input type="number" id="number" placeholder="+380">
</form>

</body>
</html>
