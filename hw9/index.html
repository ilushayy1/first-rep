<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="text">

                <img src="img/Js.png">
            </div>
            <div class="card">
                <img src="img/Avatar1.png">

                <img src="img/ReactJS.png">
            </div>
            <div class="card">
                <img src="img/ava.png">
                <p class="name">Alex Harper</p>
                <p class="stack">RN Executive</p>
                <img src="img/JAVA.png">
                <img src="img/Native.png">
            </div>
            <div class="card">
                <img src="img/Avatars.png">
                <p class="name">Amarna Miller</p>
                <p class="stack">Frontend Wizard</p>
                <img src="img/HTML.png">

</html>
