<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body>
<div class="container">
    <button>
        <img src="img/hw6.png" alt="menu">
    </button>
    <h1>Menu</h1>
    <form action="#">
        <input class="custom-input" type="text" placeholder="Search food here">
    </form>
    <div class="menu-items">
        <div class="menu-position">
            <div class="img-position">
                <img src="img/food1.png" alt="">
            </div>
            <h4 class="position-title">
                Food
            </h4>
        </div>
        <div class="menu-position">
            <div class="img-position">
                <img src="img/tropical.png" alt="">
            </div>
            <h4 class="position-title">
                Drinks
            </h4>
        </div>
        <div class="menu-position">
            <div class="img-position">
                <img src="img/ice.png" alt="">
            </div>
            <h4 class="position-title">
                Dessert
            </h4>
        </div>
        <h3>Burger</h3>
        <div class="items">
            <img src="img/burger.png">
            <div class="text">
                <p class="item-name">Big Mac</p>
                <p class="item-cost">Rs 240</p>
            </div>
        </div>
        <div class="items">
            <img src="img/kfc.png">
            <div class="text">
                <p class="item-name">KFC Double</p>
                <p class="item-cost">Rs 252</p>
            </div>
        </div>
        <div class="items">
            <img src="img/fish.png">
            <div class="text">
                <p class="item-name">Fish Burger</p>
                <p class="item-cost">Rs 220</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
